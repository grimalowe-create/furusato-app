<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふるさと納税 控除額シミュレーター【無料】｜かんたん1分で計算</title>
    <meta name="description" content="ふるさと納税の控除上限額を無料で計算できるシミュレータ。年収と家族構成から最適な寄付額の目安をかんたん1分で算出。">
    <meta name="keywords" content="ふるさと納税,控除額,シミュレーター,計算,返礼品">
    
    <!-- OGP設定 -->
    <meta property="og:title" content="ふるさと納税 控除額シミュレーター【無料】｜かんたん1分で計算">
    <meta property="og:description" content="ふるさと納税の控除上限額を無料で計算できるシミュレータ。年収と家族構成から最適な寄付額の目安をかんたん1分で算出。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background-color: #f5f6f8;
            min-height: 100vh;
            padding: 20px;
            color: #333333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: #2A9D8F;
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2A9D8F;
        }

        header p {
            font-size: 14px;
            color: #666666;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2A9D8F;
            font-size: 15px;
        }

        select, input[type="radio"] {
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            background-color: white;
        }

        select:focus {
            outline: none;
            border-color: #2A9D8F;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-label {
            display: flex;
            align-items: center;
            margin: 0;
            font-weight: 500;
            gap: 8px;
        }

        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2A9D8F;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #2A9D8F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            background-color: #237d73;
            box-shadow: 0 6px 20px rgba(42, 157, 143, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .result-section {
            background: #e8f5f4;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 12px rgba(42, 157, 143, 0.08);
            animation: fadeInResult 0.6s ease;
            margin-bottom: 20px;
            border: 1px solid #d0e8e5;
        }

        @keyframes fadeInResult {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-section.hidden {
            display: none;
        }

        .result-title {
            font-size: 20px;
            font-weight: 700;
            color: #2A9D8F;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 3px solid #2A9D8F;
            padding-bottom: 15px;
        }

        .result-item {
            margin-bottom: 25px;
            padding: 20px;
            background: white;
            border-left: 4px solid #2A9D8F;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 13px;
            color: #888888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 36px;
            font-weight: 700;
            color: #2A9D8F;
        }

        .result-value small {
            font-size: 16px;
            color: #999999;
        }

        .result-description {
            font-size: 13px;
            color: #666666;
            margin-top: 10px;
            line-height: 1.6;
        }

        .highlight-box {
            background: rgba(42, 157, 143, 0.08);
            border: 2px solid #2A9D8F;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #2A9D8F;
            line-height: 1.7;
        }

        .warning-text {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 15px;
            padding: 12px;
            background: #ffe5e5;
            border-radius: 6px;
            border-left: 4px solid #e74c3c;
        }

        .cta-button {
            width: 100%;
            padding: 16px;
            background-color: #2A9D8F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            background-color: #237d73;
            box-shadow: 0 6px 20px rgba(42, 157, 143, 0.3);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 22px;
            }

            .form-section {
                padding: 20px;
                margin-bottom: 15px;
            }

            .radio-group {
                gap: 15px;
            }

            .result-value {
                font-size: 28px;
            }

            .result-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 ふるさと納税シミュレーター</h1>
            <p>あなたの控除上限額を1分で計算！</p>
        </header>

        <form id="simulatorForm">
            <!-- 年収 -->
            <div class="form-section">
                <div class="form-group">
                    <label for="income">1. 年収</label>
                    <select id="income" required>
                        <option value="">選択してください</option>
                        <option value="2500000">300万円未満</option>
                        <option value="3500000">300〜400万円</option>
                        <option value="4500000">400〜500万円</option>
                        <option value="5500000">500〜600万円</option>
                        <option value="6500000">600〜700万円</option>
                        <option value="7500000">700〜800万円</option>
                        <option value="8500000">800〜900万円</option>
                        <option value="9500000">900〜1000万円</option>
                        <option value="12000000">1000万円以上</option>
                    </select>
                </div>
            </div>

            <!-- 家族構成 -->
            <div class="form-section">
                <div class="form-group">
                    <label>2. 家族構成</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="family" value="single" required> 独身
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="family" value="double"> 共働き夫婦
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="family" value="spouse"> 専業主婦（夫）あり
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="family" value="child1"> 子供1人
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="family" value="child2"> 子供2人以上
                        </label>
                    </div>
                </div>
            </div>

            <!-- 住宅ローン控除 -->
            <div class="form-section">
                <div class="form-group">
                    <label>3. 住宅ローン控除</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="housing" value="yes" required> あり
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="housing" value="no"> なし
                        </label>
                    </div>
                </div>
            </div>

            <!-- 医療費控除 -->
            <div class="form-section">
                <div class="form-group">
                    <label>4. 医療費控除</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="medical" value="yes" required> あり
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="medical" value="no"> なし
                        </label>
                    </div>
                </div>
            </div>

            <!-- 生命保険料控除 -->
            <div class="form-section">
                <div class="form-group">
                    <label>5. 生命保険料控除</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="insurance" value="yes" required> あり
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="insurance" value="no"> なし
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit">計算する</button>
        </form>

        <!-- 結果表示エリア -->
        <div id="resultContainer" class="result-section hidden">
            <div class="result-title">📊 あなたの控除額シミュレーション結果</div>

            <div class="result-item">
                <div class="result-label">控除上限額</div>
                <div class="result-value"><span id="limitAmount">-</span><small>円</small></div>
                <div class="result-description">この金額までふるさと納税で寄付すると、ほぼ全額が税金から控除されます。</div>
            </div>

            <div class="result-item">
                <div class="result-label">実質負担額</div>
                <div class="result-value"><span id="realBurden">2,000</span><small>円</small></div>
                <div class="result-description">ふるさと納税の寄付によって負担する金額です。この金額の節税効果が最大化します。</div>
            </div>

            <div class="result-item">
                <div class="result-label">推定節税効果</div>
                <div class="result-value" style="color: #27ae60;"><span id="taxSavings">-</span><small>円</small></div>
                <div class="result-description">控除上限額までのふるさと納税で得られる所得税・住民税の節税効果です。</div>
            </div>

            <div class="highlight-box">
                <strong>💡 おすすめの寄付額目安</strong><br>
                <span id="recommendAmount">-</span>円程度を目安に寄付することで、最大の節税効果が期待できます。
            </div>

            <div class="warning-text">
                ⚠️ ※あくまでも目安です。詳細は税理士にご相談ください。
            </div>

            <button class="cta-button" onclick="window.open('https://www.furusato-tax.jp/', '_blank');">
                🎁 お得なふるさと納税サイトをチェック！
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
